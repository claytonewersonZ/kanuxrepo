server:
  address: 0.0.0.0
  port: ${PORT:10000}

spring:
  application:
    name: kanux-backend

  datasource:
    url: jdbc:postgresql://aws-0-us-west-1.pooler.supabase.com:6543/postgres
    username: ${DB_USERNAME:postgres.amybrdlkfocmiolcnybl}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      keepalive-time: 30000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        "[format_sql]": true
        "[default_schema]": public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    url: jdbc:postgresql://aws-0-us-west-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
    user: ${DB_USERNAME:postgres.amybrdlkfocmiolcnybl}
    password: ${DB_PASSWORD}

logging:
  level:
    "[com.kanux]": DEBUG
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": DEBUG

supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET}
