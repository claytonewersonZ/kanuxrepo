server:
  address: 0.0.0.0
  port: ${PORT:10000}

spring:
  application:
    name: kanux-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://aws-0-us-west-1.pooler.supabase.com:6543/postgres}
    username: ${DB_USERNAME:postgres.jeffersondiogo-12s-project}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        "[format_sql]": true
        "[default_schema]": public

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
  level:
    "[com.kanux]": DEBUG
    "[org.springframework.security]": INFO
    "[org.hibernate.SQL]": DEBUG

supabase:
  jwt-secret: ${SUPABASE_JWT_SECRET}
